{% extends "base.html" %}
{% block content %}
<div class="flex flex-col h-full">
    <div id="chat-messages" class="flex-1 overflow-auto p-3">
        <div class="text-center opacity-60 my-5 py-5">
            <h2 class="text-xl font-bold">多智能体协作系统</h2>
            <p class="text-sm">输入任务开始对话 · 支持编程 / 写作 / 分析 / 问答 / 闲聊</p>
        </div>
    </div>

    <div class="chat-input-area border-t p-3">
        <form id="chat-form" class="flex gap-2">
            <input type="text" id="chat-input" class="input input-bordered w-full"
                   placeholder="描述你的任务（编程 / 写作 / 分析 / 问答 / 闲聊）"
                   autofocus autocomplete="off">
            <button type="submit" class="btn btn-primary">发送</button>
        </form>
    </div>
</div>
{% endblock %}
