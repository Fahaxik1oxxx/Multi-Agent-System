<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多智能体协作系统</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet">
    <link href="/static/css/custom.css" rel="stylesheet">
    <script>
        const systemStatus = {
            {% for name, model_id in role_model.items() %}
            "{{ name }}": "{{ get_model_display(name) }}"{% if not loop.last %},{% endif %}
            {% endfor %}
        };
    </script>
</head>
<body>
    <div class="drawer lg:drawer-open" id="drawer-container">
        <input id="drawer" type="checkbox" class="drawer-toggle" />
        
        <div class="drawer-content flex flex-col relative">
            <button onclick="toggleDrawer()" class="btn btn-square btn-ghost btn-sm absolute top-2 z-10" style="left: 2px;" title="切换侧栏">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <main class="flex flex-col flex-1" style="height: 100vh;">
                {% block content %}{% endblock %}
            </main>
        </div>
        
        <div class="drawer-side">
            <label for="drawer" aria-label="关闭侧栏" class="drawer-overlay"></label>
            <div class="flex flex-col p-3 w-80 min-h-full bg-base-200">
                {% include 'components/sidebar.html' %}
            </div>
        </div>
    </div>
    <script src="/static/js/chat.js"></script>
    <script>
        function toggleDrawer() {
            const c = document.getElementById('drawer-container');
            const chk = document.getElementById('drawer');
            chk.checked = !chk.checked;
            c.classList.toggle('lg:drawer-open');
        }
    </script>
</body>
</html>
