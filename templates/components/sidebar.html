</div>

<button onclick="newChat()" class="new-chat-btn w-full mb-2">

</button>

<div class="divider my-1"></div>

<div class="mb-1 relative lane-wrapper">

<div class="divider my-1"></div>

<!-- 中间可滚动（仅历史对话） -->
<div class="flex-1 min-h-0 overflow-y-auto">
    <div class="text-xs space-y-1 overflow-x-hidden" id="session-list">
        <div class="text-xs opacity-40 text-center py-2" id="session-empty">暂无对话记录</div>

</div>

<!-- 底部用户 -->
<div class="mt-auto pt-2">
    <button onclick="document.getElementById('login-modal').showModal();refreshAuthUI()" class="w-full flex items-center justify-between px-2 py-1.5 rounded-box border border-base-300 sidebar-hover cursor-pointer">

        <span class="text-xs opacity-60 truncate flex-1 ml-2" id="user-display">游客</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="opacity-40 shrink-0"><path d="M12 12a4 4 0 100-8 4 4 0 000 8zM20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/></svg>
    </button>
</div>

<!-- 系统配置弹窗 -->
<dialog id="config-modal" class="modal">
    <div class="modal-box" style="max-width:720px; padding:0; overflow:hidden; min-height:480px; border-radius:16px;">
        <div class="flex items-center justify-between px-5 py-3 border-b border-gray-100">
            <h3 class="text-base font-semibold" style="color:var(--text-primary);">系统配置</h3>
            <form method="dialog">
                <button class="modal-close">✕</button>
            </form>
        </div>
        <div class="flex" style="min-height:400px;">
            <!-- 左导航 -->
            <div class="w-36 shrink-0" style="background:var(--bg-chat); border-right:1px solid #eef0f2;">
                <div class="p-3 flex flex-col gap-0.5">
                    <div class="config-tab active" data-tab="models" onclick="switchConfigTab(this)">模型管理</div>
                    <div class="config-tab" data-tab="roles" onclick="switchConfigTab(this)">角色分配</div>
                    <div class="config-tab" data-tab="knowledge" onclick="switchConfigTab(this)">知识库</div>
                </div>
            </div>
            <!-- 右面板 -->
            <div class="flex-1 p-5 overflow-y-auto" id="config-pane">
                <!-- 模型管理 -->
                <div class="config-section" id="config-models">
                    <div id="model-list" class="text-sm space-y-2"></div>
                    <button onclick="document.getElementById('add-model-modal').showModal()" class="config-btn mt-3" style="width:100%;">+ 添加模型</button>
                </div>
                <!-- 角色分配 -->
                <div class="config-section hidden" id="config-roles">
                    <div id="role-dropdowns" class="text-sm"></div>
                </div>
                <!-- 知识库 -->
                <div class="config-section hidden" id="config-knowledge">
                    <div class="flex gap-2 mb-3">
                        <div class="flex-1 text-xs" style="color:var(--text-secondary);">文档: <span id="kb-doc-count" style="color:var(--text-primary);font-weight:500;">-</span></div>
                        <div class="flex-1 text-xs" style="color:var(--text-secondary);">切片: <span id="kb-chunk-count" style="color:var(--text-primary);font-weight:500;">-</span></div>
                    </div>
                    <div id="kb-file-list" class="text-xs space-y-1.5 mb-3 max-h-44 overflow-y-auto"></div>
                    <div class="flex flex-col gap-2">
                        <button id="kb-rebuild-btn" class="config-btn config-btn-outline">重建索引</button>
                        <label class="w-full">
                            <input type="file" id="kb-upload-input" class="config-input-file" accept=".pdf,.txt,.png,.jpg,.jpeg">
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</dialog>

<!-- 登录/注册弹窗 -->
<dialog id="login-modal" class="modal">
    <div class="modal-box" style="max-width:720px; padding:0; overflow:hidden; min-height:480px; border-radius:16px;">
        <div class="flex items-center justify-between px-5 py-3 border-b border-gray-100">

            <form method="dialog">
                <button class="modal-close">✕</button>

            <!-- 表单 -->

<input id="auth-name" type="text" class="config-input" placeholder="用户名">

<!-- 添加模型弹窗 -->
<dialog id="add-model-modal" class="modal">
    <div class="modal-box" style="max-width:480px;">
        <div class="flex items-center justify-between px-0 py-2">
            <h3 class="text-base font-semibold" style="color:var(--text-primary);">添加自定义模型</h3>
            <form method="dialog">
                <button class="modal-close">✕</button>
            </form>
        </div>
        <div class="flex flex-col gap-3 mt-2">
            <div>
                <label class="block text-xs font-medium mb-1" style="color:var(--text-secondary);">标识 (key)</label>
                <input id="am-key" class="config-input" placeholder="例: my-gpt4">
            </div>
            <div>
                <label class="block text-xs font-medium mb-1" style="color:var(--text-secondary);">显示名</label>
                <input id="am-name" class="config-input" placeholder="例: GPT-4o">
            </div>
            <div>
                <label class="block text-xs font-medium mb-1" style="color:var(--text-secondary);">API 地址</label>
                <input id="am-baseurl" class="config-input" placeholder="https://api.xxx.com/v1">
            </div>
            <div>
                <label class="block text-xs font-medium mb-1" style="color:var(--text-secondary);">API Key</label>
                <input id="am-apikey" type="password" class="config-input" placeholder="sk-...">
            </div>
            <p id="am-msg" class="text-xs" style="color:var(--text-secondary);min-height:1em;"></p>
            <button onclick="addCustomModel()" class="config-btn">添加</button>
        </div>
    </div>
</dialog>

<script>
const ROLES = systemConfig.roles || Object.keys(systemStatus || {});
let customModels = JSON.parse(localStorage.getItem("mc_custom") || "[]");
let currentRoles = {};

// 初始化：从系统默认开始，用 localStorage 覆盖
ROLES.forEach(r => { currentRoles[r] = systemConfig.default_roles[r]; });
const saved = JSON.parse(localStorage.getItem("mc_roles") || "{}");
Object.keys(saved).forEach(k => { if (k in currentRoles) currentRoles[k] = saved[k]; });

renderModelList();

function _poolDisplay(key) {
    if (systemConfig.model_pool[key]) return systemConfig.model_pool[key];
    const m = customModels.find(c => c.key === key);
    return m ? m.model : key;
}

function _poolKeys() {
    const sys = Object.keys(systemConfig.model_pool);
    const cust = customModels.map(m => m.key);
    const seen = {};
    sys.forEach(k => { seen[k] = true; });
    return sys.concat(cust.filter(k => !seen[k]));
}

function renderDropdowns() {
    const pool = _poolKeys();
    const el = document.getElementById("role-dropdowns");
    if (!el) return;
    el.innerHTML = ROLES.map(r => `
        <div class="flex items-center justify-between gap-1 mb-1">
            <span class="opacity-70 w-16">${r}</span>
            <select onchange="updateRole('${r}',this.value)" class="config-select flex-1 max-w-36">
                ${pool.map(k => `<option value="${k}" ${k === currentRoles[r] ? "selected" : ""}>${_poolDisplay(k)}</option>`).join("")}
            </select>
        </div>
    `).join("");
}

function updateRole(role, key) {
    currentRoles[role] = key;
    localStorage.setItem("mc_roles", JSON.stringify(currentRoles));
    _syncRolesToServer();
}

function renderModelList() {
    const el = document.getElementById("model-list");
    if (!el) return;
    var sysKeys = Object.keys(systemConfig.model_pool);
    var html = "";
    if (sysKeys.length) {
        html += '<div class="text-xs font-medium mb-1" style="color:var(--text-secondary);">系统模型</div>';
        sysKeys.forEach(function(k) {
            html += '<div class="flex items-center justify-between py-1 px-2 rounded" style="background:var(--bg-chat);"><span>' + escapeHtmlSidebar(systemConfig.model_pool[k]) + '</span><span class="text-xs opacity-40">默认</span></div>';
        });
    }
    if (customModels.length) {
        html += '<div class="text-xs font-medium mt-3 mb-1" style="color:var(--text-secondary);">自定义模型</div>';
        customModels.forEach(function(m) {
            html += '<div class="flex items-center justify-between py-1 px-2 rounded" style="background:var(--bg-chat);"><span>' + escapeHtmlSidebar(m.model) + ' <span class="text-xs opacity-50">(' + m.key + ')</span></span><span class="cursor-pointer text-xs" style="color:#ef4444;" onclick="delModel(\'' + m.key + '\')">删除</span></div>';
        });
    }
    if (!sysKeys.length && !customModels.length) {
        html = '<div class="text-xs opacity-40 text-center py-4">暂无模型</div>';
    }
    el.innerHTML = html;
}

function addCustomModel() {
    const key = document.getElementById("am-key").value.trim();
    const model = document.getElementById("am-name").value.trim();
    const base_url = document.getElementById("am-baseurl").value.trim();
    const api_key = document.getElementById("am-apikey").value.trim();
    const msg = document.getElementById("am-msg");
    if (msg) msg.textContent = "";

    if (!key) { msg.textContent = "请输入模型标识"; return; }
    if (!model) { msg.textContent = "请输入模型名称"; return; }
    if (!api_key) { msg.textContent = "请输入 API Key"; return; }

    if (systemConfig.model_pool[key]) {
        msg.textContent = '标识 "' + key + '" 与系统模型冲突';
        return;
    }
    if (customModels.some(function(m) { return m.key === key; })) {
        msg.textContent = '自定义模型标识 "' + key + '" 已存在';
        return;
    }

    var entry = { key: key, model: model, base_url: base_url, api_key: api_key };
    customModels.push(entry);
    localStorage.setItem("mc_custom", JSON.stringify(customModels));
    document.getElementById("am-key").value = "";
    document.getElementById("am-name").value = "";
    document.getElementById("am-baseurl").value = "";
    document.getElementById("am-apikey").value = "";
    renderModelList();
    renderDropdowns();
    _syncCustomModelToServer(entry);
    document.getElementById("add-model-modal").close();
}

function delModel(key) {
    if (!confirm("删除自定义模型「" + key + "」？")) return;
    customModels = customModels.filter(m => m.key !== key);
    localStorage.setItem("mc_custom", JSON.stringify(customModels));
    // 如果某个角色正在使用该模型，回退到系统默认
    ROLES.forEach(r => {
        if (currentRoles[r] === key) {
            currentRoles[r] = systemConfig.default_roles[r];
        }
    });
    localStorage.setItem("mc_roles", JSON.stringify(currentRoles));
    renderModelList();
    renderDropdowns();
    _deleteCustomModelOnServer(key);
}

// ── 注册用户 → 与后端同步 ──

function _isRegistered() {
    return !!localStorage.getItem("auth_token");
}

function _authHeaders() {
    var t = localStorage.getItem("auth_token");
    return t ? { "Authorization": "Bearer " + t, "Content-Type": "application/json" } : {};
}

function _syncRolesToServer() {
    if (!_isRegistered()) return;
    fetch("/api/user/config", {
        method: "PUT",
        headers: _authHeaders(),
        body: JSON.stringify({ roles: currentRoles }),
    }).catch(function(){});
}

function _syncCustomModelToServer(entry) {
    if (!_isRegistered()) return;
    fetch("/api/user/custom-models", {
        method: "POST",
        headers: _authHeaders(),
        body: JSON.stringify(entry),
    }).catch(function(){});
}

function _deleteCustomModelOnServer(key) {
    if (!_isRegistered()) return;
    fetch("/api/user/custom-models/" + encodeURIComponent(key), {
        method: "DELETE",
        headers: _authHeaders(),
    }).catch(function(){});
}

async function loadUserConfig() {
    if (!_isRegistered()) return;
    try {
        const resp = await fetch("/api/user/config", { headers: _authHeaders() });
        const data = await resp.json();
        if (data.roles) {
            currentRoles = data.roles;
            localStorage.setItem("mc_roles", JSON.stringify(currentRoles));
        }
        if (data.models) {
            customModels = data.models;
            localStorage.setItem("mc_custom", JSON.stringify(customModels));
        }
        renderModelList();
        renderDropdowns();
    } catch(e) {}
}

function newChat() {
    // 重置消息区域
    document.getElementById("chat-messages").innerHTML = `
        <div class="chat-welcome">
            <h2 class="chat-welcome-title">多智能体协作系统</h2>
            <p class="chat-welcome-sub">输入任务开始对话 · 支持编程 / 写作 / 分析 / 问答 / 闲聊</p>
        </div>
    `;
    // 重置会话变量（chat.js 中定义）
    if (typeof messageHistory !== 'undefined') messageHistory = [];
    if (typeof _currentSessionId !== 'undefined') _currentSessionId = null;
    // 刷新侧栏列表
    loadSessionHistory();
}

// ===== 执行模式悬浮弹窗 =====
var laneTimer = null;

function showLanePopup() {
    clearTimeout(laneTimer);
    var popup = document.getElementById('lane-popup');
    var trigger = document.querySelector('.lane-trigger');
    if (!popup || !trigger) return;
    var rect = trigger.getBoundingClientRect();
    var left = rect.right + 6;
    var pw = 150;
    if (left + pw > window.innerWidth) {
        left = rect.left - pw - 6;
    }
    popup.style.left = left + 'px';
    popup.style.top = rect.top + 'px';
    popup.style.display = 'block';
}
function hideLanePopup() {
    clearTimeout(laneTimer);
    laneTimer = setTimeout(function() {
        var p = document.getElementById('lane-popup');
        if (p) p.style.display = 'none';
    }, 200);
}
function cancelHideLane() {
    clearTimeout(laneTimer);
}
function selectLane(el) {
    document.querySelectorAll('.lane-option').forEach(function(o) { o.classList.remove('active'); });
    el.classList.add('active');
    var val = el.getAttribute('data-value');
    var radio = document.getElementById('lane-' + val);
    if (radio) radio.checked = true;
    if (radio) {
        var evt = document.createEvent('HTMLEvents');
        evt.initEvent('change', true, false);
        radio.dispatchEvent(evt);
    }
}

renderDropdowns();

// ===== 系统配置弹窗标签切换 =====
function switchConfigTab(el) {
    document.querySelectorAll('.config-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    var tab = el.getAttribute('data-tab');
    document.querySelectorAll('.config-section').forEach(s => s.classList.add('hidden'));
    var sec = document.getElementById('config-' + tab);
    if (sec) sec.classList.remove('hidden');
    if (tab === 'roles') renderDropdowns();
    if (tab === 'knowledge') { loadKnowledgeStats(); loadKnowledgeFiles(); }
}

// ===== 知识库文件列表 =====
function loadKnowledgeFiles() {
    var el = document.getElementById('kb-file-list');
    if (!el) return;
    fetch('/api/knowledge/files', {
            headers: { "Authorization": "Bearer " + (localStorage.getItem("auth_token") || "") }
        })
        .then(function(r) { return r.json(); })
        .then(function(files) {
            if (!files || !files.length) {
                el.innerHTML = '<div class="text-xs opacity-40 text-center py-2">暂无文件</div>';
                return;
            }
            el.innerHTML = files.map(function(f) {
                var size = f.size > 1024 ? (f.size / 1024).toFixed(1) + ' KB' : f.size + ' B';
                return '<div class="kb-file-item">' +
                    '<span class="kb-filename" title="' + escapeAttr(f.name) + '">' + escapeHtmlSidebar(f.name) + '</span>' +
                    '<span class="kb-filesize">' + size + '</span>' +
                    '<button class="kb-file-del" onclick="deleteKnowledgeFile(\'' + escapeAttr(f.name) + '\',this)" title="删除">✕</button>' +
                    '</div>';
            }).join('');
        })
        .catch(function() {
            el.innerHTML = '<div class="text-xs opacity-40 text-center py-2">加载失败</div>';
        });
}

function deleteKnowledgeFile(name, btn) {
    if (!confirm('删除文件「' + name + '」？')) return;
    btn.disabled = true;
    fetch('/api/knowledge/' + encodeURIComponent(name), {
            method: 'DELETE',
            headers: { "Authorization": "Bearer " + (localStorage.getItem("auth_token") || "") }
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) {
                loadKnowledgeFiles();
                loadKnowledgeStats();
            } else {
                alert('删除失败: ' + (data.error || '未知错误'));
                btn.disabled = false;
            }
        })
        .catch(function() {
            alert('删除失败，请重试');
            btn.disabled = false;
        });
}

function escapeAttr(str) {
    return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function escapeHtmlSidebar(str) {
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
}

// ===== 会话历史（侧栏列表，带时间分组） =====
const TIME_GROUPS = ["今天", "昨天", "7天内", "30天内", "更早"];

function getTimeCategory(updated) {
    if (!updated) return "更早";
    const now = new Date();
    const date = new Date(updated);
    const diffMs = now - date;
    const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
    const todayStr = now.toDateString();
    const yesterdayStr = new Date(now - 86400000).toDateString();
    if (date.toDateString() === todayStr) return "今天";
    if (date.toDateString() === yesterdayStr) return "昨天";
    if (diffDays < 7) return "7天内";
    if (diffDays < 30) return "30天内";
    return "更早";
}

async function loadSessionHistory() {
    // 等待 chat.js 加载完成（isGuest 等工具函数在此定义）
    if (typeof isGuest !== 'function') return;

    const el = document.getElementById("session-list");
    if (!el) return;

    // 游客 → 从 sessionStorage 加载
    if (isGuest()) {
        const sessions = loadGuestSessions();
        if (!sessions.length) {
            el.innerHTML = '<div class="text-xs opacity-40 text-center py-2">暂无对话记录</div>';
            return;
        }
        const groups = {};
        sessions.forEach(s => {
            const cat = getTimeCategory(s.updated);
            if (!groups[cat]) groups[cat] = [];
            groups[cat].push(s);
        });
        let html = "";
        TIME_GROUPS.forEach(g => {
            const items = groups[g];
            if (!items || !items.length) return;
            html += `<div class="text-xs opacity-40 mb-0.5 mt-1.5">${g}</div>`;
            items.forEach(s => {
                const title = s.title && s.title !== "空对话" ? s.title : `对话 (${s.messages.length} 条消息)`;
                html += `<div class="history-item" onclick="switchSession('${s.id}')">
                    <span class="truncate">${escapeHtmlSidebar(title)}</span>
                    <span class="history-ops" onclick="event.stopPropagation();deleteSession('${s.id}')">⋮</span>
                </div>`;
            });
        });
        el.innerHTML = html;
        return;
    }

    // 注册用户 → 带 Token
    try {
        const resp = await fetch("/api/sessions", {
            headers: { "Authorization": "Bearer " + localStorage.getItem("auth_token") }
        });
        if (!resp.ok) throw new Error("请求失败");
        const sessions = await resp.json();
        if (!sessions.length) {
            el.innerHTML = '<div class="text-xs opacity-40 text-center py-2">暂无对话记录</div>';
            return;
        }
        // 按时间分组
        const groups = {};
        sessions.forEach(s => {
            const cat = getTimeCategory(s.updated);
            if (!groups[cat]) groups[cat] = [];
            groups[cat].push(s);
        });
        // 按分组顺序渲染
        let html = "";
        TIME_GROUPS.forEach(g => {
            const items = groups[g];
            if (!items || !items.length) return;
            html += `<div class="text-xs opacity-40 mb-0.5 mt-1.5">${g}</div>`;
            items.forEach(s => {
                const title = s.title && s.title !== "空对话" ? s.title : `对话 (${s.count} 条消息)`;
                html += `<div class="history-item" onclick="switchSession('${s.id}')">
                    <span class="truncate">${escapeHtmlSidebar(title)}</span>
                    <span class="history-ops" onclick="event.stopPropagation();deleteSession('${s.id}')">⋮</span>
                </div>`;
            });
        });
        el.innerHTML = html;
    } catch (e) {
        el.innerHTML = '<div class="text-xs opacity-40 text-center py-2">加载失败</div>';
        console.error("加载会话历史失败:", e);
    }
}

async function switchSession(sid) {
    // 游客 → 从 sessionStorage 加载
    if (isGuest()) {
        const sessions = loadGuestSessions();
        const s = sessions.find(s => s.id === sid);
        if (!s) return;
        const container = document.getElementById("chat-messages");
        if (!container) return;
        container.innerHTML = "";
        if (typeof _currentSessionId !== 'undefined') _currentSessionId = sid;
        if (typeof messageHistory !== 'undefined') messageHistory = [];
        (s.messages || []).forEach(m => {
            const cls = m.role === "user" ? "message-user" : "message-assistant";
            container.innerHTML += `<div class="${cls}"><div class="bubble">${escapeHtmlSidebar(m.content || "")}</div></div>`;
            if (typeof messageHistory !== 'undefined') messageHistory.push(m);
        });
        container.scrollTop = container.scrollHeight;
        return;
    }

    // 注册用户 → 带 Token
    try {
        const resp = await fetch(`/api/sessions/${sid}`, {
            headers: { "Authorization": "Bearer " + localStorage.getItem("auth_token") }
        });
        if (!resp.ok) return;
        const data = await resp.json();
        const container = document.getElementById("chat-messages");
        if (!container) return;
        container.innerHTML = "";
        // 记录会话 ID（用于后续保存到同一会话）
        if (typeof _currentSessionId !== 'undefined') _currentSessionId = sid;
        if (typeof messageHistory !== 'undefined') messageHistory = [];
        (data.messages || []).forEach(m => {
            const role = m.role === "user" ? "user" : "assistant";
            const cls = role === "user" ? "message-user" : "message-assistant";
            container.innerHTML += `<div class="${cls}"><div class="bubble">${escapeHtmlSidebar(m.content || "")}</div></div>`;
            if (typeof messageHistory !== 'undefined') messageHistory.push(m);
        });
        container.scrollTop = container.scrollHeight;
    } catch (e) {
        console.error("加载会话失败:", e);
    }
}

async function deleteSession(sid) {
    // 游客 → 从 sessionStorage 删除
    if (isGuest()) {
        if (!confirm("删除此对话？")) return;
        const sessions = loadGuestSessions();
        saveGuestSessions(sessions.filter(s => s.id !== sid));
        loadSessionHistory();
        return;
    }

    // 注册用户 → 带 Token
    if (!confirm("删除此对话？")) return;
    try {
        await fetch(`/api/sessions/${sid}`, {
            method: "DELETE",
            headers: { "Authorization": "Bearer " + localStorage.getItem("auth_token") }
        });
        loadSessionHistory();
    } catch (e) {
        console.error("删除会话失败:", e);
    }
}

loadSessionHistory();

// ===== 登录/注册 =====
let authMode = "login";

function refreshAuthUI() {
    var token = localStorage.getItem("auth_token");
    var uname = localStorage.getItem("mc_uname") || "";
    var body = document.getElementById("auth-body");
    var tabs = document.getElementById("auth-tabs");
    var form = document.getElementById("auth-form");
    var msg = document.getElementById("auth-msg");
    var title = document.getElementById("login-modal-title");
    if (!body) return;
    if (token && uname) {
        // 已登录状态
        updateAuthUI(uname);
        if (tabs) tabs.style.display = "none";
        if (form) form.style.display = "none";
        if (msg) msg.textContent = "";
        if (title) title.textContent = "账户";
        body.innerHTML = '<div class="flex flex-col items-center gap-4 py-4">' +
            '<span class="w-16 h-16 rounded-full bg-gray-100 inline-flex items-center justify-center text-xl font-bold" style="color:var(--brand-primary);">' + uname.charAt(0).toUpperCase() + '</span>' +
            '<span class="text-sm font-medium" style="color:var(--text-primary);">' + escapeHtmlSidebar(uname) + '</span>' +
            '<button onclick="logout()" class="config-btn config-btn-outline" style="max-width:200px;">退出登录</button>' +
            '</div>';
        return;
    }
    // 未登录：显示登录/注册表单
    if (tabs) tabs.style.display = "flex";
    if (title) title.textContent = "登录";
    body.innerHTML =
        '<div class="flex gap-0 mb-4 border-b border-gray-100" id="auth-tabs">' +
            '<span class="auth-tab active" onclick="switchAuthTab(\'login\')" id="tab-login">登录</span>' +
            '<span class="auth-tab" onclick="switchAuthTab(\'register\')" id="tab-register">注册</span>' +
        '</div>' +
        '<div id="auth-form" class="flex flex-col gap-3">' +
            '<input id="auth-name" type="text" class="config-input" placeholder="用户名">' +
            '<input id="auth-password" type="password" class="config-input" placeholder="密码">' +
            '<div id="auth-confirm-wrap" class="hidden"><input id="auth-confirm" type="password" class="config-input" placeholder="确认密码"></div>' +
            '<button onclick="submitAuth()" class="config-btn" id="auth-btn">登录</button>' +
        '</div>' +
        '<p id="auth-msg" class="text-xs text-center mt-3" style="color:var(--text-secondary);"></p>';
    authMode = "login";
}

function switchAuthTab(mode) {
    authMode = mode;
    var t = document.getElementById("auth-tabs");
    if (!t) return;
    t.querySelectorAll(".auth-tab").forEach(function(el) { el.classList.remove("active"); });
    var tabEl = document.getElementById("tab-" + mode);
    if (tabEl) tabEl.classList.add("active");
    var wrap = document.getElementById("auth-confirm-wrap");
    if (wrap) wrap.classList.toggle("hidden", mode === "login");
    var btn = document.getElementById("auth-btn");
    if (btn) btn.textContent = mode === "login" ? "登录" : "注册";
    document.getElementById("auth-name").value = "";
    document.getElementById("auth-password").value = "";
    var c = document.getElementById("auth-confirm");
    if (c) c.value = "";
    var m = document.getElementById("auth-msg");
    if (m) m.textContent = "";
}

async function submitAuth() {
    var name = document.getElementById("auth-name").value.trim();
    var password = document.getElementById("auth-password").value.trim();
    var msg = document.getElementById("auth-msg");
    if (!name || !password) { msg.textContent = "请填写完整"; return; }

    if (authMode === "register") {
        var confirm = document.getElementById("auth-confirm").value.trim();
        if (password !== confirm) { msg.textContent = "两次密码不一致"; return; }
        try {
            const resp = await fetch("/api/auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: name, password: password }),
            });
            const data = await resp.json();
            if (data.error) { msg.textContent = data.error; return; }
            // 保存 token
            localStorage.setItem("auth_token", data.token);
            localStorage.setItem("mc_uname", data.name);
            // 迁移游客会话
            await migrateGuestSessions();
            // 加载用户配置
            await loadUserConfig();
            // 更新 UI
            updateAuthUI(name);
            document.getElementById("login-modal").close();
            msg.textContent = "";
            loadSessionHistory();
        } catch(e) { msg.textContent = "注册失败"; }
    } else {
        try {
            const resp = await fetch("/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: name, password: password }),
            });
            const data = await resp.json();
            if (resp.status === 429) { msg.textContent = data.error; return; }
            if (data.error) { msg.textContent = data.error; return; }
            localStorage.setItem("auth_token", data.token);
            localStorage.setItem("mc_uname", data.name);
            await migrateGuestSessions();
            await loadUserConfig();
            updateAuthUI(name);
            document.getElementById("login-modal").close();
            msg.textContent = "";
            loadSessionHistory();
        } catch(e) { msg.textContent = "登录失败"; }
    }
}

function updateAuthUI(name) {
    document.getElementById("user-display").textContent = name;
    document.getElementById("user-avatar").textContent = name.charAt(0).toUpperCase();
}

async function migrateGuestSessions() {
    const guestSessions = typeof loadGuestSessions === 'function' ? loadGuestSessions() : [];
    if (guestSessions.length === 0) return;
    const token = localStorage.getItem("auth_token");
    if (!token) return;
    const remaining = [];
    for (const s of guestSessions) {
        try {
            await fetch("/api/sessions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token,
                },
                body: JSON.stringify({ id: s.id, messages: s.messages, title: s.title }),
            });
        } catch (e) {
            console.warn("迁移失败:", s.id, e);
            remaining.push(s);
        }
    }
    if (remaining.length > 0) {
        if (typeof saveGuestSessions === 'function') saveGuestSessions(remaining);
    } else {
        sessionStorage.removeItem("guest_sessions");
    }
}

async function logout() {
    if (!confirm("确认退出登录？")) return;
    // 调用后端删除 token
    const token = localStorage.getItem("auth_token");
    if (token) {
        try { await fetch("/api/auth/logout", { method: "POST", headers: { "Authorization": "Bearer " + token } }); } catch(e) {}
    }
    localStorage.removeItem("auth_token");
    localStorage.removeItem("mc_uname");
    document.getElementById("user-display").textContent = "游客";
    document.getElementById("user-avatar").textContent = "游";
    document.getElementById("login-modal").close();
    // 清空聊天区
    const chatEl = document.getElementById("chat-messages");
    if (chatEl) { chatEl.innerHTML = '<div class="chat-welcome"><h2 class="chat-welcome-title">多智能体协作系统</h2><p class="chat-welcome-sub">输入任务开始对话 · 支持编程 / 写作 / 分析 / 问答 / 闲聊</p></div>'; }
    if (typeof messageHistory !== 'undefined') messageHistory = [];
    if (typeof _currentSessionId !== 'undefined') _currentSessionId = null;
    const el = document.getElementById("session-list");
    if (el) el.innerHTML = '<div class="text-xs opacity-40 text-center py-2">暂无对话记录</div>';
    // 清空用户配置缓存，回退系统默认
    localStorage.removeItem("mc_roles");
    localStorage.removeItem("mc_custom");
    customModels = [];
    ROLES.forEach(r => { currentRoles[r] = systemConfig.default_roles[r]; });
    renderModelList();
    renderDropdowns();
}

// 恢复登录状态
(function() {
    var token = localStorage.getItem("auth_token");
    var uname = localStorage.getItem("mc_uname");
    if (token && uname) {
        document.getElementById("user-display").textContent = uname;
        document.getElementById("user-avatar").textContent = uname.charAt(0).toUpperCase();
        loadUserConfig();
    }
})();
</script>
