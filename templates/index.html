{% extends "base.html" %}
{% block content %}
<div class="flex flex-col h-full" style="background:var(--bg-chat);">
    <div id="chat-messages" class="flex-1 overflow-auto p-3">
        <div class="chat-welcome">
            <h2 class="chat-welcome-title">多智能体协作系统</h2>
            <p class="chat-welcome-sub">输入任务开始对话 · 支持编程 / 写作 / 分析 / 问答 / 闲聊</p>
        </div>
    </div>

    <div class="chat-input-area">
        <form id="chat-form" class="input-wrapper">
            <textarea id="chat-input" rows="3"
                   placeholder="给 Multi-Agent 发送任务（编程 / 写作 / 分析 / 问答 / 闲聊）"
                   autofocus></textarea>
            <button type="button" class="attach-btn" title="上传附件（开发中）">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <button type="submit" class="send-btn" title="发送 (Enter)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 11 7-7 7 7M12 4v16"/></svg>
            </button>
        </form>
    </div>
    <script>
    // 输入框自动扩展
    document.getElementById('chat-input').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 200) + 'px';
    });
    </script>
</div>
{% endblock %}
